kind = "web"
previewPath = "/"
title = "AI Media Suite"
version = "1.0.0"
id = "artifacts/ai-suite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24981
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-suite run dev"

[services.env]
PORT = "24981"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-suite", "run", "build"]
publicDir = "artifacts/ai-suite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
